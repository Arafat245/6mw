<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1250 800" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#2563EB"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#DC2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#16A34A"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#7C3AED"/>
    </marker>
    <linearGradient id="clinic-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EFF6FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="home-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEE2E2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FEF2F2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pls-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DCFCE7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0FDF4;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ================================================================ -->
  <!-- CLINIC PATHWAY -->
  <!-- ================================================================ -->
  <rect x="20" y="20" width="1210" height="310" rx="14" fill="url(#clinic-grad)" stroke="#93C5FD" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="45" y="55" font-size="20" font-weight="bold" fill="#1D4ED8">CLINIC PATHWAY</text>
  <text x="260" y="55" font-size="16" fill="#3B82F6">(6-Minute Walk Test)</text>

  <!-- Sensor -->
  <rect x="45" y="80" width="155" height="80" rx="10" fill="white" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="122" y="108" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E40AF">Wrist Accel.</text>
  <text x="122" y="130" text-anchor="middle" font-size="13" fill="#3B82F6">30 Hz, 3-axis</text>
  <text x="122" y="148" text-anchor="middle" font-size="13" fill="#3B82F6">during 6MWT</text>

  <!-- Arrow sensor→preproc -->
  <line x1="200" y1="120" x2="245" y2="120" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Preprocessing -->
  <rect x="250" y="80" width="170" height="80" rx="10" fill="white" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="335" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E40AF">Preprocessing</text>
  <text x="335" y="124" text-anchor="middle" font-size="12" fill="#64748B">Gravity removal</text>
  <text x="335" y="140" text-anchor="middle" font-size="12" fill="#64748B">Rodrigues rotation</text>
  <text x="335" y="156" text-anchor="middle" font-size="12" fill="#64748B">→ AP, ML, VT axes</text>

  <!-- Arrow preproc→features (single arrow to midpoint, then fan out) -->
  <line x1="420" y1="120" x2="468" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="120" x2="468" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="120" x2="468" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Gait -->
  <rect x="470" y="72" width="175" height="58" rx="10" fill="white" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="557" y="97" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E40AF">Gait (11)</text>
  <text x="557" y="118" text-anchor="middle" font-size="11" fill="#64748B">cadence, jerk, ENMO, HR, RMS</text>

  <!-- CWT -->
  <rect x="470" y="140" width="175" height="58" rx="10" fill="white" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="557" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E40AF">CWT (28)</text>
  <text x="557" y="186" text-anchor="middle" font-size="11" fill="#64748B">wavelet energy, entropy, freq</text>

  <!-- WalkSway -->
  <rect x="470" y="208" width="175" height="58" rx="10" fill="white" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="557" y="233" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E40AF">WalkSway (12)</text>
  <text x="557" y="254" text-anchor="middle" font-size="11" fill="#64748B">ENMO-norm. ML/AP sway</text>

  <!-- Arrows features→combine -->
  <line x1="645" y1="101" x2="693" y2="148" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="645" y1="169" x2="693" y2="165" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="645" y1="237" x2="693" y2="182" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Combine -->
  <rect x="695" y="135" width="140" height="60" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/>
  <text x="765" y="162" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E40AF">Combine</text>
  <text x="765" y="184" text-anchor="middle" font-size="14" fill="#1E40AF">55 features</text>

  <!-- Demo (Clinic) -->
  <rect x="695" y="275" width="140" height="50" rx="10" fill="white" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="765" y="298" text-anchor="middle" font-size="15" font-weight="bold" fill="#6D28D9">Demo (4)</text>
  <text x="765" y="316" text-anchor="middle" font-size="12" fill="#64748B">cohort, age, sex, height</text>

  <!-- Demo→Combine -->
  <line x1="765" y1="275" x2="765" y2="197" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Arrow combine→ridge -->
  <line x1="835" y1="165" x2="878" y2="165" stroke="#2563EB" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <!-- Ridge Clinic -->
  <rect x="880" y="130" width="155" height="70" rx="10" fill="#1D4ED8" stroke="#1E40AF" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="957" y="160" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Ridge (α=10)</text>
  <text x="957" y="182" text-anchor="middle" font-size="13" fill="#BFDBFE">LOO CV, n=101</text>

  <!-- Arrow ridge→result -->
  <line x1="1035" y1="165" x2="1078" y2="165" stroke="#16A34A" stroke-width="3" marker-end="url(#arrow-green)"/>

  <!-- Clinic Result -->
  <rect x="1080" y="125" width="140" height="80" rx="12" fill="white" stroke="#16A34A" stroke-width="3.5" filter="url(#shadow)"/>
  <text x="1150" y="155" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803D">Clinic</text>
  <text x="1150" y="177" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803D">6MWD</text>
  <text x="1150" y="197" text-anchor="middle" font-size="14" font-weight="bold" fill="#16A34A">Prediction</text>

  <!-- ================================================================ -->
  <!-- HOME PATHWAY -->
  <!-- ================================================================ -->
  <rect x="20" y="350" width="1210" height="340" rx="14" fill="url(#home-grad)" stroke="#FCA5A5" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="45" y="385" font-size="20" font-weight="bold" fill="#DC2626">HOME PATHWAY</text>
  <text x="235" y="385" font-size="16" fill="#EF4444">(Free-Living Monitoring)</text>

  <!-- Sensor -->
  <rect x="45" y="410" width="155" height="80" rx="10" fill="white" stroke="#EF4444" stroke-width="2.5"/>
  <text x="122" y="438" text-anchor="middle" font-size="16" font-weight="bold" fill="#B91C1C">Wrist Accel.</text>
  <text x="122" y="460" text-anchor="middle" font-size="13" fill="#EF4444">30 Hz, 3-axis</text>
  <text x="122" y="478" text-anchor="middle" font-size="13" fill="#EF4444">7-day wear</text>

  <!-- Arrow sensor→walk detect -->
  <line x1="200" y1="450" x2="245" y2="450" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Walking Detection -->
  <rect x="250" y="410" width="170" height="80" rx="10" fill="white" stroke="#EF4444" stroke-width="2.5"/>
  <text x="335" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="#B91C1C">Walking Bout</text>
  <text x="335" y="455" text-anchor="middle" font-size="14" font-weight="bold" fill="#B91C1C">Detection</text>
  <text x="335" y="475" text-anchor="middle" font-size="12" fill="#64748B">Activity index +</text>
  <text x="335" y="488" text-anchor="middle" font-size="12" fill="#64748B">periodicity → AP,ML,VT</text>

  <!-- Arrows walk detect→features -->
  <line x1="420" y1="440" x2="468" y2="430" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="450" x2="468" y2="500" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="460" x2="468" y2="570" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Home Gait -->
  <rect x="470" y="402" width="175" height="58" rx="10" fill="white" stroke="#EF4444" stroke-width="2.5"/>
  <text x="557" y="427" text-anchor="middle" font-size="16" font-weight="bold" fill="#B91C1C">Gait (11)</text>
  <text x="557" y="448" text-anchor="middle" font-size="11" fill="#64748B">same features, walking bouts</text>

  <!-- Home CWT -->
  <rect x="470" y="470" width="175" height="58" rx="10" fill="white" stroke="#EF4444" stroke-width="2.5"/>
  <text x="557" y="495" text-anchor="middle" font-size="16" font-weight="bold" fill="#B91C1C">CWT (28)</text>
  <text x="557" y="516" text-anchor="middle" font-size="11" fill="#64748B">same CWT, walking bouts</text>

  <!-- Home WalkSway -->
  <rect x="470" y="538" width="175" height="58" rx="10" fill="white" stroke="#EF4444" stroke-width="2.5"/>
  <text x="557" y="563" text-anchor="middle" font-size="16" font-weight="bold" fill="#B91C1C">WalkSway (12)</text>
  <text x="557" y="584" text-anchor="middle" font-size="11" fill="#64748B">ENMO-norm. walking sway</text>

  <!-- ================================================================ -->
  <!-- PLS DOMAIN ADAPTATION -->
  <!-- ================================================================ -->

  <!-- Arrow home gait→PLS -->
  <line x1="645" y1="431" x2="688" y2="460" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- PLS Box -->
  <rect x="690" y="435" width="175" height="105" rx="12" fill="url(#pls-grad)" stroke="#16A34A" stroke-width="3" filter="url(#shadow)"/>
  <text x="777" y="465" text-anchor="middle" font-size="17" font-weight="bold" fill="#15803D">PLS (nc=2)</text>
  <text x="777" y="490" text-anchor="middle" font-size="13" fill="#166534">Home Gait →</text>
  <text x="777" y="508" text-anchor="middle" font-size="13" fill="#166534">Clinic Gait Space</text>
  <text x="777" y="532" text-anchor="middle" font-size="12" fill="#64748B" font-style="italic">Domain Adaptation</text>

  <!-- Dashed arrow from clinic gait to PLS (training target) -->
  <line x1="645" y1="101" x2="670" y2="101" stroke="#3B82F6" stroke-width="2" stroke-dasharray="8,5"/>
  <line x1="670" y1="101" x2="670" y2="460" stroke="#3B82F6" stroke-width="2" stroke-dasharray="8,5"/>
  <line x1="670" y1="460" x2="688" y2="465" stroke="#3B82F6" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrow-blue)"/>
  <text x="662" y="295" text-anchor="end" font-size="13" fill="#3B82F6" font-style="italic" transform="rotate(-90, 662, 295)">training target</text>

  <!-- Arrow PLS→combine -->
  <line x1="865" y1="487" x2="908" y2="487" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- PLS Combine -->
  <rect x="910" y="457" width="145" height="60" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
  <text x="982" y="483" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803D">Combine</text>
  <text x="982" y="505" text-anchor="middle" font-size="13" fill="#15803D">2 PLS + 3 Demo</text>

  <!-- Demo (Home) -->
  <rect x="740" y="620" width="140" height="50" rx="10" fill="white" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="810" y="643" text-anchor="middle" font-size="15" font-weight="bold" fill="#6D28D9">Demo (3)</text>
  <text x="810" y="662" text-anchor="middle" font-size="12" fill="#64748B">cohort, age, sex</text>

  <!-- Demo→Combine -->
  <line x1="810" y1="620" x2="960" y2="519" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Arrow combine→ridge -->
  <line x1="1055" y1="487" x2="1078" y2="487" stroke="#16A34A" stroke-width="3" marker-end="url(#arrow-green)"/>

  <!-- Ridge Home -->
  <rect x="1080" y="452" width="140" height="70" rx="10" fill="#DC2626" stroke="#B91C1C" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1150" y="482" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Ridge (α=10)</text>
  <text x="1150" y="504" text-anchor="middle" font-size="13" fill="#FECACA">LOO CV, n=101</text>

  <!-- Arrow ridge→result -->
  <line x1="1150" y1="522" x2="1150" y2="548" stroke="#DC2626" stroke-width="3" marker-end="url(#arrow-red)"/>

  <!-- Home Result -->
  <rect x="1080" y="550" width="140" height="80" rx="12" fill="white" stroke="#DC2626" stroke-width="3.5" filter="url(#shadow)"/>
  <text x="1150" y="580" text-anchor="middle" font-size="16" font-weight="bold" fill="#B91C1C">Home</text>
  <text x="1150" y="602" text-anchor="middle" font-size="16" font-weight="bold" fill="#B91C1C">6MWD</text>
  <text x="1150" y="622" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">Prediction</text>

  <!-- ================================================================ -->
  <!-- LEGEND -->
  <!-- ================================================================ -->
  <rect x="20" y="710" width="1210" height="80" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>

  <rect x="45" y="725" width="18" height="18" rx="4" fill="#3B82F6"/>
  <text x="72" y="740" font-size="14" fill="#334155"><tspan font-weight="bold">Clinic:</tspan> 51 sensor + 4 demo features → Ridge</text>

  <rect x="45" y="755" width="18" height="18" rx="4" fill="#DC2626"/>
  <text x="72" y="770" font-size="14" fill="#334155"><tspan font-weight="bold">Home:</tspan> PLS maps home gait → clinic space, + 3 demo → Ridge</text>

  <rect x="640" y="725" width="18" height="18" rx="4" fill="#16A34A"/>
  <text x="667" y="740" font-size="14" fill="#334155"><tspan font-weight="bold">PLS:</tspan> Domain adaptation (home → clinic feature space)</text>

  <rect x="640" y="755" width="18" height="18" rx="4" fill="#7C3AED"/>
  <text x="667" y="770" font-size="14" fill="#334155"><tspan font-weight="bold">Demo:</tspan> Demographics (cohort, age, sex, ± height)</text>

</svg>
